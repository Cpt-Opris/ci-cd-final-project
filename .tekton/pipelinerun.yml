apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: ci-pipeline-run
spec:
  pipelineRef:
    name: ci-pipeline

  params:
    - name: repo-url
      value: https://github.com/ibm-developer-skills-network/ci-cd-final-project
    - name: app-name
      value: flask-app
    - name: build-image
      value: image-registry.openshift-image-registry.svc:5000/$(context.pipelineRun.namespace)/flask-app

  workspaces:
    - name: output
      persistentVolumeClaim:
        claimName: oc-lab-pvc
