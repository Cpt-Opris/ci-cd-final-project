apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah
spec:
  description: Stub buildah task for restricted lab clusters
  params:
    - name: IMAGE
      type: string
    - name: DOCKERFILE
      type: string
      default: ./Dockerfile
    - name: CONTEXT
      type: string
      default: .
  workspaces:
    - name: source
  steps:
    - name: build
      image: alpine:3
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -eu
        echo "Simulating image build for $(params.IMAGE)"
        echo "Dockerfile: $(params.DOCKERFILE)"
        echo "Context: $(params.CONTEXT)"
        test -f Dockerfile
        echo "Build task completed successfully"
